services:
  # Service 1: The Accelerated LLM Core Execution Layer
  ollama-core:
    image: ollama/ollama:latest
    container_name: ollama_core
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        
        sleep 5
        
        echo "=== Checking System Volume Cache ==="
        if /bin/ollama list | grep -q "gemma4:e4b"; then
          echo "=== Success: Model 'gemma4:e4b' detected. Skipping download phase ==="
        else
          echo "=== Model not found or incomplete. Initiating resilient pull... ==="
          
          # Loop until the ollama pull command exits with a true 0 status code
          until /bin/ollama pull gemma4:e4b; do
            echo "=== Pull interrupted (Network drop/EOF). Retrying in 3 seconds... ==="
            sleep 3
          done
          
          echo "=== Sync complete: Model weights 100% verified ==="
        fi
        
        wait
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Service 2: The Socket Analytical API Webserver
  agent-server:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: agent_server
    restart: unless-stopped
    command: python src/server.py
    environment:
      - OLLAMA_HOST=http://ollama-core:11434
    volumes:
      - ./src:/app/src
      - ./snapshots:/app/snapshots
      - ./categories:/app/categories
      - ./workspace:/app/workspace  # Shared directory layout mapping
      - shared_socket:/app/run/img_engine
      - ./run/mempalace_db:/app/run/mempalace_db # Map data right to your host folder
      - ./mempalace_config.json:/root/.mempalace/config.json # Mount global config file
    depends_on:
      - ollama-core

  # Service 3: The Filesystem Hot-Folder Observer Listener
  agent-watcher:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: agent_watcher
    restart: unless-stopped
    command: python src/watcher.py
    volumes:
      - ./src:/app/src
      - ./workspace:/app/workspace  # Shared identical footprint layout mapping
      - shared_socket:/app/run/img_engine
    depends_on:
      - agent-server

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - OLLAMA_HOST=http://ollama-core:11434
    volumes:
      - ./src:/app/src
      - ./categories:/app/categories:ro
      - ./snapshots:/app/snapshots:ro
      - ./run/mempalace_db:/app/run/mempalace_db:ro
    depends_on:
      - ollama-core
    restart: unless-stopped
    # Not exposed to the host directly — the frontend's nginx proxies to it
    # over the compose network. If you want to hit the API directly for
    # debugging, temporarily add: ports: ["8420:8420"]

  frontend:
    build:
      context: ./frontend
    ports:
      - "8085:80"
    depends_on:
      - api-server
    restart: unless-stopped

volumes:
  ollama_storage:
  shared_socket: # Named volume allows IPC socket coordination between server and watcher
